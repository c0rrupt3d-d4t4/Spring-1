<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <meta charset="UTF-8">
    <title>Modificar Producto</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/styleAdmin.css}">
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #000;">
	    <div class="container-fluid">
	        <a class="navbar-brand d-flex align-items-center" href="#">
	            <img src="https://images.unsplash.com/photo-1529788295308-1eace6f67388?..." width="35" height="35" class="d-inline-block align-top me-2" alt="Logo" style="border-radius: 5px;">
	            <span>Mercado Eclicse</span>
	        </a>
			<ul class="navbar-nav me-auto">

			    <li class="nav-item">
			        <a class="nav-link" th:href="@{./listadoPedidosTotales}">Ver Pedidos Clientes</a>
			    </li>

	            <li class="nav-item">
	                <a class="nav-link " href="./anadirProducto">Añadir Productos</a>
	            </li>
	            <li class="nav-item">
	                <a class="nav-link active" href="./modificarProducto">Modificar Producto</a>
	            </li>
				</ul>


	        <div class="d-flex">
	            <a href="../index.html" class="btn btn-outline-danger btn-sm">
	                Cerrar Sesión
	            </a>
	        </div>
	    </div>
	</nav>
 	
	<div class="container mt-5">
		<h2>Modificar Producto</h2>
		
		<table class="table table-bordered mt-4">

		    <thead class="table-dark">

		        <tr>
		            <th>NOMBRE</th>
		            <th>PRECIO</th>
		            <th>URL_IMAGEN</th>
		            <th>DISPONIBLE</th>
		            <th>EDITAR</th>
		            <th>ELIMINAR</th>
		        </tr>

		    </thead>

		    <tbody>

				<tr th:each="producto : ${productos}">
				    <!-- FORMULARIO MODIFICAR -->
				    <!-- Usamos th:action para asegurar que la ruta sea correcta desde cualquier nivel -->
				    <form th:action="@{/admin/modificar-producto}" method="post">
				        <input type="hidden" name="id" th:value="${producto.id}">

				        <td>
				            <input type="text" name="nombre" th:value="${producto.nombre}" class="form-control">
				        </td>

				        <td>
				            <input type="number" step="0.01" name="precio" th:value="${producto.precio}" class="form-control">
				        </td>

				        <td>
				            <input type="text" name="imagenUrl" th:value="${producto.imagenUrl}" class="form-control">
				        </td>

				        <td class="text-center">
				            <!-- El nombre 'disponible' debe coincidir con el @RequestParam del controlador -->
				            <input type="checkbox" name="disponible" th:checked="${producto.disponible}">
				        </td>

				        <td>
				            <button type="submit" class="btn btn-warning">Modificar</button>
				        </td>
				    </form>

				    <!-- FORMULARIO ELIMINAR -->
				    <td>
				        <form th:action="@{/admin/eliminar-producto}" method="post">
				            <input type="hidden" name="id" th:value="${producto.id}">
				            <button type="submit" class="btn btn-danger">Eliminar</button>
				        </form>
				    </td>
				</tr>
		    </tbody>

		</table>
	</div>

</body>
</html>
