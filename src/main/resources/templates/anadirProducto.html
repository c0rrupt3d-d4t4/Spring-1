<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--Añadir producto-->
<head>
    <meta charset="UTF-8">
    <title>Añadir Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #000;">
	    <div class="container-fluid">
	        <a class="navbar-brand d-flex align-items-center" href="#">
	            <img src="https://images.unsplash.com/photo-1529788295308-1eace6f67388?..." width="35" height="35" class="d-inline-block align-top me-2" alt="Logo" style="border-radius: 5px;">
	            <span>Mercado Eclicse</span>
	        </a>
			<ul class="navbar-nav me-auto">

			    <li class="nav-item">
			        <a class="nav-link" th:href="@{./listadoPedidosTotales}">Ver Pedidos Clientes</a>
			    </li>

	            <li class="nav-item">
	                <a class="nav-link active" href="./anadirProducto">Añadir Productos</a>
	            </li>
	            <li class="nav-item">
	                <a class="nav-link" href="./modificarProducto">Modificar Producto</a>
	            </li>
				<li class="nav-item">
								    <a class="nav-link" href="./permisos">Permisos</a>
								</li>
				</ul>


	        <div class="d-flex">
	            <a href="../index.html" class="btn btn-outline-danger btn-sm">
	                Cerrar Sesión
	            </a>
	        </div>
	    </div>
	</nav>

<div class="container mt-5">

    <h2>Añadir Producto</h2>

    <form action="/admin/guardar-producto" method="post">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="nombre" class="form-control">
        </div>

        <div class="mb-3">
            <label>Precio</label>
            <input type="number" step="0.01" name="precio" class="form-control">
        </div>

        <div class="mb-3">
            <label>URL Imagen</label>
            <input type="text" name="imagenUrl" class="form-control">
        </div>
		
		<div class="mb-3 form-check">
		    <input type="checkbox" name="disponible" class="form-check-input" id="disponible" checked>
		    <label class="form-check-label" for="disponible">
		        Disponible
		    </label>
		</div>

        <button class="btn btn-primary">Guardar Producto</button>

    </form>

    <p class="mt-3 text-success" th:text="${mensaje}"></p>

</div>

</body>
</html>
